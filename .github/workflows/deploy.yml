name: 🚀 自動外送網頁到免費主機 (終極全自動版)

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 動態結構全自動多專案同步
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 步驟1：取得最新程式碼
      uses: actions/checkout@v4

    - name: 🏗️ 步驟2：動態配置專案資料夾結構
      run: |
        mkdir -p deploy_temp/htdocs/HTML_CSS_PRACTICE
        
        rsync -av --exclude='deploy_temp' --exclude='.git' --exclude='.github' ./ deploy_temp/htdocs/HTML_CSS_PRACTICE

    - name: 📂 步驟3：透過 FTP 安全同步到主機
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./deploy_temp/
        server-dir: ./